name: Daily Stock Scan

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:   # ✅ allows manual run from UI

jobs:
  run-stock-scan:
    runs-on: ubuntu-latest

    env:
      SENDER: ${{secrets.SENDER}}
      PASSWORD: ${{secrets.PASSWORD}}
      RECEIVER: ${{secrets.RECEIVER}}
      
    steps:
      - name: Checkout
        uses: actions/checkout@
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug env
        run: python -c "import os;print('SENDER:', os.getenv('SENDER')); print('PASS_LEN:' len(os.getenv('PASSWORD') or '')); print('RECEIVER:', os.getenv('RECEIVER'))"

      - name: Run email script
        run: sharetrading.py 
