name: Daily Stock Scan

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:   # ✅ allows manual run from UI

jobs:
  run-stock-scan:
    runs-on: ubuntu-latest

    env:
      SMTP_USER: ${{secrets.SENDER}}
      SMTP_PASSWORD: ${{secrets.PASSWORD}}
      RECEIVER: ${{secrets.RECEIVER}}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug env vars
        run: |
          python << 'EOF'
      import os
      pwd = os.getenv ("PASSWORD")
      print("TYPE:", type(pwd))
      print("LENGTH:", len(pwd) if pwd else 0)
      print("REPR:", repr(pwd))
      EOF
      
      - name: Install dependencies
        run: |
          pip install yfinance pandas

      - name: Run script
        run: python sharetrading.py
